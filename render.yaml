# =====================================================
# Render.com Infrastructure as Code
# Deploy: connect GitHub repo → Render auto-reads this file
# =====================================================

databases:
  - name: braincoin-db
    plan: free
    databaseName: braincoin
    user: braincoin_user

services:
  - type: web
    name: braincoin
    runtime: docker
    plan: starter
    # Uses the root Dockerfile (multi-stage: builds frontend, runs backend)
    envVars:
      - key: NODE_ENV
        value: production

      # Automatically linked to the PostgreSQL database above
      - key: DATABASE_URL
        fromDatabase:
          name: braincoin-db
          property: connectionString

      # Auto-generated secure secret — never touch manually
      - key: JWT_SECRET
        generateValue: true

      # The public URL of this service on Render
      # Used by Stripe redirect URLs (success/cancel)
      # Change to your custom domain once connected
      - key: FRONTEND_URL
        value: https://braincoin.onrender.com

      # ── Fill these in Render Dashboard → Environment ──
      - key: STRIPE_SECRET_KEY
        sync: false          # paste sk_live_... or sk_test_...

      - key: STRIPE_WEBHOOK_SECRET
        sync: false          # paste whsec_... from Stripe Dashboard

      - key: STRIPE_PRICE_ID
        sync: false          # paste price_... (NOT prod_...)

      - key: ANTHROPIC_API_KEY
        sync: false          # paste sk-ant-...
