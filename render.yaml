# =====================================================
# Render.com Infrastructure as Code
# Deploy: connect GitHub repo → Render auto-reads this file
# =====================================================
# NOTE: Using shared Render PostgreSQL (ittoken_db).
# BrainCoin tables are isolated in schema "braincoin".
# Set DATABASE_URL manually in Render Dashboard → Environment.

services:
  - type: web
    name: brain-coin
    runtime: docker
    plan: starter
    # Uses the root Dockerfile (multi-stage: builds frontend, runs backend)
    envVars:
      - key: NODE_ENV
        value: production

      # Shared Render PostgreSQL — set manually in Dashboard:
      # postgresql://ittoken_db_user:...@.../ittoken_db?options=-csearch_path%3Dbraincoin
      - key: DATABASE_URL
        sync: false

      # Auto-generated secure secret — never touch manually
      - key: JWT_SECRET
        generateValue: true

      # The public URL of this service on Render
      # Used by Stripe redirect URLs (success/cancel)
      - key: FRONTEND_URL
        value: https://brain-coin.onrender.com

      # Allow CORS from the Render service URL
      - key: CORS_ORIGIN
        value: https://brain-coin.onrender.com

      # ── Fill these in Render Dashboard → Environment ──
      - key: STRIPE_SECRET_KEY
        sync: false          # paste sk_live_... or sk_test_...

      - key: STRIPE_WEBHOOK_SECRET
        sync: false          # paste whsec_... from Stripe Dashboard

      - key: STRIPE_PRICE_ID
        sync: false          # paste price_... (NOT prod_...)

      - key: ANTHROPIC_API_KEY
        sync: false          # paste sk-ant-...
